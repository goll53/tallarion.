<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Талларион | Вход</title>
    <style>
        body { 
            background-image: url('action.jpg');
            background-attachment: fixed;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #d1d1d1; 
            font-family: 'Georgia', serif; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            min-height: 100vh; 
            margin: 0; 
            overflow: hidden;
        }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .cover { 
            text-align: center; 
            padding: 50px; 
            background: rgba(17, 17, 17, 0.7); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(162, 134, 196, 0.3); 
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.8); 
            max-width: 600px; 
            width: 90%; 
            border-radius: 15px;
            animation: fadeIn 2s ease-out;
        }
        h1 { color: #a286c4; font-size: 2.8em; letter-spacing: 7px; text-transform: uppercase; margin: 0; text-shadow: 0 0 20px rgba(162, 134, 196, 0.5); }
        .subtitle { color: #aaa; font-style: italic; margin-bottom: 30px; letter-spacing: 1px; }
        .dialog-trigger { width: 100%; max-width: 280px; border-radius: 10px; cursor: pointer; transition: 0.5s; border: 1px solid #444; margin: 20px 0; }
        .dialog-trigger:hover { border-color: #a286c4; transform: scale(1.05); box-shadow: 0 0 20px rgba(162, 134, 196, 0.4); }
        #dialogue-box { display: none; margin: 20px 0; text-align: left; padding: 20px; background: rgba(0,0,0,0.5); border-left: 3px solid #a286c4; animation: fadeIn 0.5s; }
        .char-name { color: #a286c4; font-weight: bold; font-size: 0.8em; text-transform: uppercase; display: block; margin-bottom: 5px; }
        .btn { padding: 18px 45px; border: 1px solid #a286c4; color: #a286c4; text-decoration: none; transition: 0.5s; display: inline-block; margin-top: 25px; font-weight: bold; letter-spacing: 3px; border-radius: 5px; text-transform: uppercase; }
        .btn:hover { background: #a286c4; color: #111; box-shadow: 0 0 30px rgba(162, 134, 196, 0.6); transform: translateY(-2px); }
    </style>
</head>
<body>
    <audio id="voiceAudio" src="voice.mp3"></audio>
    <div class="cover">
        <h1>Край неполной формы</h1>
        <p class="subtitle">Хроника хроноархитектора Таллариона</p>
        <p style="color: #a286c4; font-size: 0.9em;">Нажми на артефакт</p>
        <img src="dialog.jpg" class="dialog-trigger" onclick="toggleVoice()">
        <div id="dialogue-box">
            <div style="margin-bottom:10px;"><span class="char-name">Персонаж 1:</span> — Ты уверен, что эта запись сохранится? Талларион угасает.</div>
            <div><span class="char-name">Персонаж 2:</span> — Пока есть тот, кто читает эти строки, образ будет жить.</div>
        </div>
        <br>
        <a href="chapter1.html" class="btn" onclick="killVoice()">ВОЙТИ В ТАЛЛАРИОН</a>
    </div>
    <script>
        localStorage.setItem('musicPlaying', 'false');
        localStorage.removeItem('musicTime');
        const voice = document.getElementById('voiceAudio');
        const box = document.getElementById('dialogue-box');
        function toggleVoice() {
            if (voice.paused) { voice.play(); box.style.display = "block"; } 
            else { voice.pause(); box.style.display = "none"; }
        }
        function killVoice() { voice.pause(); voice.currentTime = 0; }
    </script>
</body>
</html>
