<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Талларион | Вход</title>
    <style>
        body { background: #0a0a0c; color: #d1d1d1; font-family: 'Georgia', serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        .cover { text-align: center; border: 1px solid #333; padding: 40px; background: #111; box-shadow: 0 0 50px rgba(162, 134, 196, 0.1); max-width: 600px; width: 90%; }
        h1 { color: #a286c4; font-size: 2.5em; letter-spacing: 5px; text-transform: uppercase; margin-bottom: 10px; }
        .dialog-img { width: 100%; max-width: 300px; border-radius: 8px; cursor: pointer; transition: 0.4s; border: 1px solid #333; margin: 10px 0; }
        .dialog-img:hover { border-color: #a286c4; box-shadow: 0 0 20px rgba(162, 134, 196, 0.3); }
        #dialogue { display: none; margin: 20px 0; text-align: left; padding: 20px; background: #000; border-left: 2px solid #a286c4; animation: fadeIn 1s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .char-name { color: #a286c4; font-weight: bold; font-size: 0.8em; text-transform: uppercase; display: block; }
        .btn { padding: 15px 40px; border: 1px solid #a286c4; color: #a286c4; text-decoration: none; transition: 0.5s; letter-spacing: 2px; display: inline-block; margin-top: 30px; font-weight: bold; }
        .btn:hover { background: #a286c4; color: #000; box-shadow: 0 0 20px #a286c4; }
    </style>
    <script>
        // Принудительный сброс музыки на главной
        localStorage.setItem('musicPlaying', 'false');
        localStorage.removeItem('musicTime');

        function toggleDialogue() {
            const d = document.getElementById('dialogue');
            d.style.display = (d.style.display === 'block') ? 'none' : 'block';
        }
    </script>
</head>
<body>
    <div class="cover">
        <h1>Край неполной формы</h1>
        <p style="color:#888; font-style:italic;">Хроника хроноархитектора Таллариона</p>
        <p style="color:#a286c4; font-size:0.9em; margin-top:20px;">Слушать вступление (диалог)</p>
        <p style="font-size:0.8em; font-style:italic;">нажми ↓</p>
        
        <img src="dialog.jpg" alt="Диалог" class="dialog-img" onclick="toggleDialogue()">
        
        <div id="dialogue">
            <div style="margin-bottom:10px;">
                <span class="char-name">Персонаж 1:</span> — Ты уверен, что эта запись сохранится? Талларион угасает.
            </div>
            <div>
                <span class="char-name">Персонаж 2:</span> — Пока есть тот, кто читает эти строки, образ будет жить.
            </div>
        </div>
        <br>
        <a href="chapter1.html" class="btn">ВОЙТИ В ТАЛЛАРИОН</a>
    </div>
</body>
</html>
